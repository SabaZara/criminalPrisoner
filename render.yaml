# Render blueprint: deploys this Vite + React SPA as a free static site.
# When you connect this repo on render.com, Render reads this file and
# provisions everything automatically — no clicking through forms needed.

services:
  - type: web
    name: criminal-prisoner
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA: every route should fall back to index.html so React Router (or
    # any client-side navigation) works on direct loads / refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache static assets aggressively, but keep index.html fresh so deploys
    # are visible without a hard refresh.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
